name: Test

on:
  push:
    branches:
      - '**'
      - '!dependabot/**'
  pull_request:

permissions:  # added using https://github.com/step-security/secure-workflows
  contents: read

jobs:
  ruby-versions:
    uses: ruby/actions/.github/workflows/ruby_versions.yml@master
    with:
      min_version: 3.2
      versions: '["mswin"]'
      engine: cruby-truffleruby

  test:
    needs: ruby-versions
    strategy:
      fail-fast: false
      matrix:
        ruby: ${{ fromJson(needs.ruby-versions.outputs.versions) }}
        os: [ubuntu-latest, macos-latest, windows-latest]
        exclude:
          - os: windows-latest
            ruby: truffleruby
          - os: windows-latest
            ruby: truffleruby-head
          - os: macos-latest
            ruby: mswin
          - os: ubuntu-latest
            ruby: mswin

    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
    - name: Set up Ruby
      uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: true # 'bundle install' and cache
    - name: Verify generated parser files
      run: bundle exec rake verify_generated
    - name: Run test
      run: bundle exec rake
      env:
        RUBYOPT: --enable-frozen_string_literal
    - if: ${{ matrix.ruby == 'head' && startsWith(matrix.os, 'ubuntu') }}
      run: bundle exec rake rdoc
    - if: ${{ matrix.ruby == 'head' && startsWith(matrix.os, 'ubuntu') }}
      run: bundle exec rake install

  prism-version-test:
    needs: ruby-versions
    strategy:
      fail-fast: false
      matrix:
        prism_version: ['1.6.0', '1.7.0', 'head']
    runs-on: ubuntu-latest
    env:
      RUBYOPT: --enable-frozen_string_literal
      PRISM_VERSION: ${{matrix.prism_version}}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: ${{ fromJson(needs.ruby-versions.outputs.latest) }}
          bundler-cache: true
      - name: Run test
        run: bundle exec rake
